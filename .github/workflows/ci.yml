name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    # Dummy values: typecheck/lint/build do not connect to the database or Supabase.
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/upnext
      DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/upnext
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
